<html>
    <head>
        <title></title>
        <style>
*{
    padding:0px;
    margin: 0px;
}

.contenedor{
    width: 800px;
    height: 300px;
    border: 1px solid black;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
}
.tarjeta1, .tarjeta2, .tarjeta3, .tarjeta4 {
    width: 200px;
    height: 300px;
    position: absolute;
    top: -300px;
        background-size: cover;
        
}
.tarjeta1{
    background-image: url(img/mar.jpg);

    left: 0px;
    animation: tarjeta1 3s 1 forwards;
}
.tarjeta2{
    background-image: url(img/selva.jpg);
    background-size: cover;
    left: 200px;
    animation: tarjeta1 3s  1 forwards 3s;
}
.tarjeta3{
    background-image: url(img/costa.jpg);
    left: 400px;
    animation: tarjeta1 3s 1 forwards 6s;
}
.tarjeta4{
  background-image: url(img/sierra.jpg);
    left: 600px;
    animation: tarjeta1 3s 1 forwards 9s;
}

@keyframes tarjeta1 {
    0% {
        top: -300px;
        transform: rotateY(180deg);

    }

    50% {
        top: 300px;

    }
    100%{
        top: 0px;
    }
    
    
}

.tarjeta1:hover{
    transition: 1s;
    scale: 1.2;
    z-index: 1;
}

.tarjeta2:hover{
    transition: 1s;
    scale: 1.2;
    z-index: 1;
}

.tarjeta3:hover{
    transition: 1s;
    scale: 1.2;
    z-index: 1;
}

.tarjeta4:hover{
    transition: 1s;
    scale: 1.2;
    z-index: 1;
}
.h1{
    position:absolute;
    bottom:-100px;
    height: 25px;
    width: 800px;
    text-align: center;
    background: rgba(0,0,0,0.7);
    border: 2px solid rgb(255, 255, 255);
    color:white;
    transition: 1s;
    animation: adelante 3s forwards 11s;
        }

 @keyframes adelante{
            0%{
                bottom:-100px;
                transform: rotateY(180deg);
               
            }


            50%{
                bottom: 0;
                transform: rotateZ(180deg);
                
            }

            100%{
                bottom:50px;
                
            }
        }

.h1:hover{
    transition: 1s;
    scale: 1.2;
    z-index: 1;
}
        </style>
    </head>
    <body>
        <div class="Contenedor">
            
            <div class="tarjeta1"></div>
            <div class="tarjeta2"></div>
            <div class="tarjeta3"></div>
            <div class="tarjeta4"></div>

            <div class="h1" >TURISTICOS</div>
        </div>

        

        <a href="../index.html">Atras </a>
    </body>
</html>
